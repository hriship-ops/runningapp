<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Run Journal</title>
  <link rel="stylesheet" href="/assets/runningapp/css/run-journal-www.css">
</head>
<body>
  <div class="rw-app">

    <!-- HEADER -->
    <div class="rw-header">
      <div class="rw-logo">
        <div class="rw-logo-icon">&#9673;</div>
        <div>
          <div class="rw-logo-title">Run Journal</div>
          <div class="rw-logo-sub" id="rw-total-sub">Loading...</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="rw-btn-import" id="rw-sync-btn" onclick="rwSyncStrava()" style="display:none">&#8635; Sync Strava</button>
        <button class="rw-btn-import" id="rw-login-btn" onclick="rwShowLogin()" style="background:#374151">&#128274; Login</button>
        <button class="rw-btn-import" id="rw-logout-btn" onclick="rwLogout()" style="display:none;background:#374151">&#128275; Logout</button>
      </div>
    </div>

    <!-- TICKER -->
    <div class="rw-ticker-wrap">
      <div class="rw-ticker-label">Recent</div>
      <div class="rw-ticker-items" id="rw-ticker"></div>
      <div class="rw-ticker-nav">
        <button onclick="rwTickerPrev()">&#8249;</button>
        <span id="rw-ticker-page">1/1</span>
        <button onclick="rwTickerNext()">&#8250;</button>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="rw-filters">
      <select id="rw-year"></select>
      <select id="rw-month">
        <option value="">All Months</option>
        <option value="01">January</option>
        <option value="02">February</option>
        <option value="03">March</option>
        <option value="04">April</option>
        <option value="05">May</option>
        <option value="06">June</option>
        <option value="07">July</option>
        <option value="08">August</option>
        <option value="09">September</option>
        <option value="10">October</option>
        <option value="11">November</option>
        <option value="12">December</option>
      </select>
      <button class="rw-btn-search" onclick="rwSearch()">Search</button>
      <button class="rw-btn-reset" onclick="rwReset()">Reset</button>
    </div>

    <!-- FOCUS FILTER -->
    <div class="rw-focus-bar">
      <span class="rw-focus-label">Focus on</span>
      <button class="rw-focus-btn active" onclick="rwSetFocus('Run')">Runs</button>
      <button class="rw-focus-btn" onclick="rwSetFocus('Swimming')">Swims</button>
      <button class="rw-focus-btn" onclick="rwSetFocus('Cycling')">Cycling</button>
      <button class="rw-focus-btn" onclick="rwSetFocus('Walk')">Walks</button>
      <button class="rw-focus-btn" onclick="rwSetFocus('')">All</button>
    </div>

    <!-- STAT CARDS -->
    <div class="rw-section-label" id="rw-section-label">Loading...</div>
    <div class="rw-cards-grid" id="rw-cards"></div>

    <!-- ALL-TIME RECORDS -->
    <div class="rw-section-label" style="margin-top:24px">All-time records</div>
    <div class="rw-cards-grid rw-records-grid" id="rw-records"></div>

    <!-- RECENT RUNS -->
    <div class="rw-recent-section">
      <div class="rw-recent-title">Recent Runs</div>
      <div id="rw-recent-runs">Loading...</div>
    </div>

    <!-- WEEKLY SUMMARY -->
    <div class="rw-table-section">
      <div class="rw-table-title">Last 8 Weeks</div>
      <div id="rw-weekly-table">Loading...</div>
    </div>

    <!-- MONTHLY SUMMARY -->
    <div class="rw-table-section">
      <div class="rw-table-title">Last 12 Months</div>
      <div id="rw-monthly-table">Loading...</div>
    </div>

    <!-- YEARLY SUMMARY -->
    <div class="rw-table-section">
      <div class="rw-table-title">By Year</div>
      <div id="rw-yearly-table">Loading...</div>
    </div>

    <!-- RUN LIST MODAL -->
    <div class="rw-modal-overlay" id="rw-modal" style="display:none" onclick="rwCloseModal(event)">
      <div class="rw-modal">
        <div class="rw-modal-header">
          <div class="rw-modal-title" id="rw-modal-title">Runs</div>
          <button class="rw-modal-close" onclick="rwCloseModal()">&#215;</button>
        </div>
        <div class="rw-modal-body">
          <table class="rw-table">
            <thead>
              <tr>
                <th>Date</th><th>Activity</th><th>Location</th>
                <th>Distance</th><th>Time</th><th>Pace</th>
              </tr>
            </thead>
            <tbody id="rw-modal-rows"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- LOGIN MODAL -->
    <div class="rw-modal-overlay" id="rw-login-modal" style="display:none" onclick="rwCloseLoginModal(event)">
      <div class="rw-modal" style="max-width:360px">
        <div class="rw-modal-header">
          <div class="rw-modal-title">Login</div>
          <button class="rw-modal-close" onclick="rwCloseLoginModal()">&#215;</button>
        </div>
        <div class="rw-modal-body" style="padding:24px">
          <div style="margin-bottom:16px">
            <label style="display:block;color:#9ca3af;font-size:12px;margin-bottom:6px">Username</label>
                          <input id="rw-login-user" type="text" value="hrishi.p@azimpremjifoundation.org"
              style="width:100%;box-sizing:border-box;background:#111827;border:1px solid #374151;color:#f1f5f9;padding:8px 12px;border-radius:6px;font-size:14px">
          </div>
          <div style="margin-bottom:24px">
            <label style="display:block;color:#9ca3af;font-size:12px;margin-bottom:6px">Password</label>
            <input id="rw-login-pass" type="password"
              style="width:100%;box-sizing:border-box;background:#111827;border:1px solid #374151;color:#f1f5f9;padding:8px 12px;border-radius:6px;font-size:14px"
              onkeydown="if(event.key==='Enter') rwDoLogin()">
          </div>
          <div id="rw-login-error" style="color:#ef4444;font-size:13px;margin-bottom:12px;display:none"></div>
          <button onclick="rwDoLogin()"
            style="width:100%;background:#3b82f6;color:#fff;border:none;padding:10px;border-radius:6px;font-size:14px;cursor:pointer">
            Login
          </button>
        </div>
      </div>
    </div>

  </div>

  <script>
    // Check login state on page load
    fetch('/api/method/frappe.auth.get_logged_user')
      .then(r => r.json())
      .then(data => {
        var user = data.message;
        if (user && user !== 'Guest') {
          document.getElementById('rw-sync-btn').style.display = '';
          document.getElementById('rw-login-btn').style.display = 'none';
          document.getElementById('rw-logout-btn').style.display = '';
        }
      });

    function rwShowLogin() {
      document.getElementById('rw-login-modal').style.display = 'flex';
      setTimeout(function() { document.getElementById('rw-login-pass').focus(); }, 100);
    }

    function rwCloseLoginModal(e) {
      if (!e || e.target === document.getElementById('rw-login-modal'))
        document.getElementById('rw-login-modal').style.display = 'none';
    }

    function rwDoLogin() {
      var usr = document.getElementById('rw-login-user').value;
      var pwd = document.getElementById('rw-login-pass').value;
      var err = document.getElementById('rw-login-error');
      err.style.display = 'none';
      fetch('/api/method/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: 'usr=' + encodeURIComponent(usr) + '&pwd=' + encodeURIComponent(pwd)
      })
      .then(r => r.json())
      .then(data => {
        if (data.message === 'Logged In') {
          location.reload();
        } else {
          err.textContent = 'Invalid username or password';
          err.style.display = 'block';
        }
      })
      .catch(function() {
        err.textContent = 'Login failed — please try again';
        err.style.display = 'block';
      });
    }

    function rwLogout() {
      fetch('/api/method/logout', {method: 'POST'})
        .then(function() { location.reload(); });
    }
  </script>

  <script src="/assets/runningapp/js/run-journal-www.js"></script>
</body>
</html>
